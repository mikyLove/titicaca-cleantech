name: Daily PR Summary

on:
  schedule:
    - cron: '0 8 * * *' # every day at 08:00 UTC

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gather recent PRs
        id: gather
        uses: actions/github-script@v6
        with:
          script: |
            const since = new Date(Date.now() - 24*60*60*1000);
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            const recent = prs.filter(p => new Date(p.created_at) >= since);
            const reverts = prs.filter(p => p.title && /revert/i.test(p.title));
            const lines = [];
            lines.push(`Resumen diario de PRs para ${context.repo.owner}/${context.repo.repo}`);
            lines.push('');
            lines.push('PRs creados en las últimas 24 horas:');
            if(recent.length === 0) lines.push('- Ninguno');
            for (const p of recent) lines.push(`- ${p.title} (#${p.number}) por ${p.user.login}: ${p.html_url}`);
            lines.push('');
            lines.push('Reverts detectados (por título):');
            if(reverts.length === 0) lines.push('- Ninguno');
            for (const p of reverts) lines.push(`- ${p.title} (#${p.number}) por ${p.user.login}: ${p.html_url}`);
            return lines.join('\n');

      - name: Send daily summary email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "[Titicaca] Resumen diario de PRs"
          body: ${{ steps.gather.outputs.result }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "titicaca-notifier@localhost"
